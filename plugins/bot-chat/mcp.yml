          - heading "Agent Client Protocol (ACP)" [level=1] [ref=e201]
          - generic [ref=e202]:
            - generic [ref=e203]:
              - paragraph [ref=e204]:
                - text: Kiro CLI implements the
                - link "Agent Client Protocol (ACP)" [ref=e205] [cursor=pointer]:
                  - /url: https://agentclientprotocol.com/get-started/introduction
                - text: ", an open standard that enables AI agents to work with any compatible editor. This means you can use Kiro's agentic capabilities in JetBrains IDEs, Zed, and other ACP-compatible editors."
              - generic [ref=e206]:
                - heading "What is ACP?" [level=2] [ref=e207]
                - link "Copy link to What is acp section" [ref=e208] [cursor=pointer]:
                  - /url: "#what-is-acp"
                  - img [ref=e210]
              - paragraph [ref=e213]: AI coding agents and editors are tightly coupled, but interoperability isn't the default. Each editor must build custom integrations for every agent, and agents must implement editor-specific APIs. This creates integration overhead, limited compatibility, and developer lock-in.
              - paragraph [ref=e214]: ACP solves this by providing a standardized protocol for agent-editor communication—similar to how the Language Server Protocol (LSP) standardized language server integration. Agents that implement ACP work with any compatible editor, and editors that support ACP gain access to all ACP-compatible agents.
              - generic [ref=e215]:
                - heading "Quick start" [level=2] [ref=e216]
                - link "Copy link to Quick start section" [ref=e217] [cursor=pointer]:
                  - /url: "#quick-start"
                  - img [ref=e219]
              - paragraph [ref=e222]: "Run Kiro as an ACP agent:"
              - generic [ref=e223]:
                - generic [ref=e224]:
                  - generic [ref=e225]: bash
                  - button "Copy code to clipboard" [ref=e226] [cursor=pointer]:
                    - img [ref=e227]
                  - status [ref=e230]
                - code [ref=e233]: kiro-cli acp
              - paragraph [ref=e234]: "To use a specific agent configuration:"
              - generic [ref=e235]:
                - generic [ref=e236]:
                  - generic [ref=e237]: bash
                  - button "Copy code to clipboard" [ref=e238] [cursor=pointer]:
                    - img [ref=e239]
                  - status [ref=e242]
                - code [ref=e245]:
                  - generic [ref=e246]: kiro-cli acp --agent my-agent
              - paragraph [ref=e247]: The agent communicates over stdin/stdout using JSON-RPC 2.0. Configure your editor to spawn this command, and you're ready to go.
              - generic [ref=e248]:
                - heading "Editor setup" [level=2] [ref=e249]
                - link "Copy link to Editor setup section" [ref=e250] [cursor=pointer]:
                  - /url: "#editor-setup"
                  - img [ref=e252]
              - paragraph [ref=e255]: Kiro CLI can be used as an ACP agent in any editor that supports the protocol.
              - note "Note" [ref=e256]:
